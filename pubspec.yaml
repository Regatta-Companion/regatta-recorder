name: regatta_recorder
description: Minimalistische regatta track recorder met timer
publish_to: 'none'
version: 1.1.3+6

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  geolocator: ^11.0.0
  gpx: ^2.2.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  wakelock_plus: ^1.2.0
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.3.0
  http: ^1.2.1
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
